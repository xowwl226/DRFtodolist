<div class="header">
    <h1>
	<a href="{% url 'todo:list' %}" style="text-decoration:none; color:inherit;">
	Todo 서비스
	</a>
	</h1>

    <div>
        {% if request.user.is_authenticated %}
            <span>{{ request.user.username }}님 환영합니다</span>

            <button id="logoutBtn">로그아웃</button>

        {% else %}
            <a href="/login/">로그인</a>
            <a href="/signup-page/">회원가입</a>
        {% endif %}
    </div>
</div>

<hr>
<script>
document.addEventListener("DOMContentLoaded", () => {

    // 로그아웃 버튼 요소 가져오기
    const btn = document.getElementById("logoutBtn");

    // 버튼이 없는 페이지에서는 코드 실행 중단
    if (!btn) return;


    // -----------------------------
    // CSRF 토큰을 쿠키에서 가져오는 함수
    // Django에서 POST 요청 시 CSRF 검증에 필요
    // -----------------------------
    function getCSRF() {
        return document.cookie
            .split("; ")
            .find(row => row.startsWith("csrftoken="))
            ?.split("=")[1];
    }


    // -----------------------------
    // 로그아웃 버튼 클릭 이벤트
    // -----------------------------
    btn.addEventListener("click", async () => {
        try {

            // axios POST 요청 → 로그아웃 API 호출
            await axios.post("/api/logout/", {}, {

                // 세션 쿠키(sessionid)를 요청에 포함
                withCredentials: true,

                // Django CSRF 보호를 통과하기 위한 헤더
                headers: {
                    "X-CSRFToken": getCSRF()
                }
            });

            // 로그아웃 성공 후 로그인 페이지로 이동
            window.location.href = "/login/";

            // 다른 페이지로 이동하고 싶으면 아래 사용 가능
            // window.location.href = "/todo/list/";

        } catch (err) {

            // 오류 발생 시 콘솔에 출력
            console.log(err.response?.data || err.message);

            // 사용자에게 실패 메시지 표시
            alert("로그아웃 실패");
        }
    });
});
</script>
